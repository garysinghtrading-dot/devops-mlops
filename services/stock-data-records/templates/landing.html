<!DOCTYPE html>
<html>
<head>
    <title>Stock Dashboard</title>
</head>
<body>

<h1>Welcome {{ user }}</h1>

<h2>Your Stock Holdings</h2>

<table border="1" cellpadding="5">
    <tr>
        <th>Ticker</th>
        <th>Total Shares</th>
        <th>Average Cost</th>
    </tr>
    {% for p in positions %}
    <tr>
        <td>{{ p.ticker }}</td>
        <td>{{ p.total_shares }}</td>
        <td>${{ p.avg_cost }}</td>
    </tr>
    {% endfor %}
</table>

<hr>

<h2>Update Your Holdings</h2>

<form action="/update" method="POST">

    <label>Action:</label>
    <input type="radio" name="action" value="buy" checked> Buy
    <input type="radio" name="action" value="sell"> Sell
    <br><br>

    <label>Ticker:</label>
    <select name="ticker">
        {% for p in positions %}
        <option value="{{ p.ticker }}">{{ p.ticker }}</option>
        {% endfor %}
    </select>
    <br><br>

    <label>Quantity:</label>
    <input type="number" name="quantity" required>
    <br><br>

    <label>Price:</label>
    <input type="number" step="0.01" name="price" required>
    <br><br>

    <button type="submit">Submit</button>
</form>

</body>
</html>
