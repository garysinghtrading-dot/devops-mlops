apiVersion: apps/v1
kind: Deployment
metadata:
  name: stock-records-deployment
  labels:
    app: stock-records-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: stock-records-app
  template:
    metadata:
      labels:
        app: stock-records-app
    spec:
      containers:
      - name: ml-flask-app
        # Injected via CI/CD
        image: ${IMAGE_URL}
        ports:
        - containerPort: 8080
        
        env:
        - name: PORT
          value: "8080"
        - name: BUCKET_NAME
          value: "${GCS_BUCKET_NAME}" # GCS storage bucket name
        - name: MODEL_PATH
          value: "${EVICTION_MODEL_PATH}" # Model pathway for eviction model on GCS
        - name: DATA_SOURCE
          value: "gcs-bucket"
        - name: PORT
          value: "8080"

        resources:
          limits:
            cpu: "500m"
            memory: "512Mi"
          requests:
            cpu: "250m"
            memory: "256Mi"

      # Schedules pods onto Spot VM pool
      nodeSelector:
        workload: ml-inference