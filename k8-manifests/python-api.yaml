apiVersion: apps/v1
kind: Deployment
metadata:
  name: python-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: python-api
  template:
    metadata:
      labels:
        app: python-api
    spec:
      # 1. Spot VM Targeting
      nodeSelector:
        workload: ml-inference
      containers:
      - name: python-api
        image: us-central1-docker.pkg.dev/machine-learning-416604/my-app-repo/python-api:v1
        ports:
        - containerPort: 8080
        env:
        # 2. API Key for Authentication
        - name: API_KEY
          value: "dev-secret-key-123"
        # 3. Liveness and Readiness Probes
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 15
          periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: python-api-internal
spec:
  selector:
    app: python-api
  ports:
    - protocol: TCP
      port: 80         
      targetPort: 8080 
  type: ClusterIP